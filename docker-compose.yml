services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
